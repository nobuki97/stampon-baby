name: Deploy main → stampon

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (stampon)
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_Y4hn81HC3O9Qd5BGqxqHMJeS
          VERCEL_PROJECT_ID: prj_mPuJWFiynfepBGzTm0lDr0g2gyOZ
