name: Deploy main → stampon

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Vercel project link
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_mPuJWFiynfepBGzTm0lDr0g2gyOZ","orgId":"team_Y4hn81HC3O9Qd5BGqxqHMJeS"}' > .vercel/project.json

      - name: Deploy to Vercel (stampon)
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -o 'https://[^ ]*vercel\.app')
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Assign production alias
        run: |
          npx vercel alias set ${{ steps.deploy.outputs.deploy_url }} stampon-two.vercel.app --token=${{ secrets.VERCEL_TOKEN }} --scope=nobuki-higashitanis-projects
          echo "Production alias set: stampon-two.vercel.app → ${{ steps.deploy.outputs.deploy_url }}"
